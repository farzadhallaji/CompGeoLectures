site_name: Computational Geometry Notes
site_url: https://farzadhallaji.github.io/CompGeoLectures/
site_description: Computational geometry lecture notes (MkDocs + Material)
repo_url: https://github.com/farzadhallaji/CompGeoLectures
repo_name: farzadhallaji/CompGeoLectures

docs_dir: Lectures/docs

theme:
